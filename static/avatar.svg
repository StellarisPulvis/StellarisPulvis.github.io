<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a373"/>
      <stop offset="100%" stop-color="#bc6c25"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdfaf5"/>
      <stop offset="100%" stop-color="#f5ede0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- bg circle -->
  <circle cx="50" cy="50" r="49" fill="url(#bgGrad)"/>

  <!-- inner border ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#fdfaf5" stroke-width="1" stroke-opacity="0.15"/>

  <!-- star -->
  <polygon points="50,22 54.7,35.5 69,35.8 57.6,44.5 61.8,58.2 50,50 38.2,58.2 42.4,44.5 31,35.8 45.3,35.5"
           fill="url(#starGrad)" filter="url(#glow)"/>

  <!-- stardust particles -->
  <circle cx="72" cy="24" r="1.4" fill="#fdfaf5" opacity="0.8"/>
  <circle cx="80" cy="44" r="1" fill="#fdfaf5" opacity="0.5"/>
  <circle cx="73" cy="66" r="1.2" fill="#fdfaf5" opacity="0.6"/>
  <circle cx="56" cy="78" r="1.8" fill="#fdfaf5" opacity="0.7"/>
  <circle cx="36" cy="75" r="1" fill="#fdfaf5" opacity="0.5"/>
  <circle cx="21" cy="58" r="1.5" fill="#fdfaf5" opacity="0.65"/>
  <circle cx="26" cy="30" r="1" fill="#fdfaf5" opacity="0.55"/>
  <circle cx="44" cy="15" r="1.1" fill="#fdfaf5" opacity="0.45"/>
  <circle cx="63" cy="48" r="0.8" fill="#fdfaf5" opacity="0.4"/>
  <circle cx="47" cy="68" r="1" fill="#fdfaf5" opacity="0.35"/>
  <circle cx="30" cy="46" r="0.7" fill="#fdfaf5" opacity="0.3"/>
</svg>
