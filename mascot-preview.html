<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新吉祥物预览 v2 · Starborn</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, sans-serif;
  overflow: hidden;
}

.preview {
  text-align: center;
  padding: 2rem;
}

.preview h1 {
  color: #fbbf24;
  font-size: 1.5rem;
  margin-bottom: 3rem;
  letter-spacing: 0.05em;
  text-shadow: 0 0 20px rgba(251,191,36,0.3);
}

.scene {
  position: relative;
  width: 300px;
  height: 350px;
  margin: 0 auto;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Sparkle bg */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--d, 2s) ease-in-out infinite alternate;
  opacity: 0;
}
.sparkle:nth-child(1) { top: 10%; left: 10%; --d: 1.8s; }
.sparkle:nth-child(2) { top: 5%; right: 15%; --d: 2.4s; width: 3px; height: 3px; }
.sparkle:nth-child(3) { bottom: 15%; left: 5%; --d: 3.0s; width: 5px; height: 5px; }
.sparkle:nth-child(4) { bottom: 10%; right: 8%; --d: 2.0s; width: 3px; height: 3px; }
.sparkle:nth-child(5) { top: 30%; right: 2%; --d: 2.7s; }
.sparkle:nth-child(6) { top: 50%; left: 3%; --d: 2.2s; width: 3px; height: 3px; }

@keyframes twinkle {
  0% { opacity: 0; transform: scale(0.5); }
  100% { opacity: 0.9; transform: scale(1.2); }
}

/* Character */
  .character {
  position: relative;
  width: 220px;
  height: 260px;
  cursor: default;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Glow */
.character::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 200px;
  height: 200px;
  transform: translate(-50%, -55%);
  background: radial-gradient(circle, rgba(251,191,36,0.12) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

/* ── 3D oval body ── */
.oval-body {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 126px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 38% 32%, #fef3c7, #fbbf24 20%, #f59e0b 50%, #d97706 80%, #b45309);
  box-shadow:
    inset -8px -12px 20px rgba(120, 53, 15, 0.35),
    inset 6px 8px 20px rgba(255, 255, 255, 0.25),
    0 8px 32px rgba(251, 191, 36, 0.3);
}

/* ── Face ── */
.face-area {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  z-index: 2;
}

/* Eyes */
.eyes {
  display: flex;
  gap: 18px;
  align-items: center;
}

.character-eye {
  width: 28px;
  height: 30px;
  background: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.2s ease;
  box-shadow: inset 0 -2px 4px rgba(0,0,0,0.06);
}

.eyeball {
  width: 20px;
  height: 20px;
  background: #312e81;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.2s ease;
}

.pupil {
  width: 12px;
  height: 12px;
  background: #1e1b4b;
  border-radius: 50%;
  transition: all 0.2s ease;
  transform: translate(var(--pupil-x, 0), var(--pupil-y, 0));
}

.pupil::after {
  content: "";
  position: absolute;
  top: 1px;
  right: 1px;
  width: 5px;
  height: 5px;
  background: #fff;
  border-radius: 50%;
  opacity: 0.9;
}

/* Mouth */
.mouth {
  margin-top: 2px;
  width: 14px;
  height: 8px;
  border-bottom: 2.5px solid #7c2d12;
  border-radius: 0 0 50% 50%;
  transition: all 0.3s ease;
}

/* Blush */
.blush {
  display: flex;
  gap: 34px;
  margin-top: 2px;
}

.blush-dot {
  width: 16px;
  height: 10px;
  background: rgba(251, 113, 133, 0.4);
  border-radius: 50%;
  filter: blur(3px);
}

/* ── Crown stars ── */
.crown-star {
  position: absolute;
  z-index: 3;
  color: #fde68a;
  line-height: 1;
  filter: drop-shadow(0 2px 6px rgba(253,230,138,0.4));
  animation: crownPulse 2s ease-in-out infinite alternate;
}
.crown-star.top { top: -10px; left: 50%; transform: translateX(-50%); font-size: 20px; }
.crown-star.tl { top: -4px; left: 15%; font-size: 14px; animation-delay: 0.3s; }
.crown-star.tr { top: -4px; right: 15%; font-size: 14px; animation-delay: 0.3s; }
.crown-star.side-l { top: 14px; left: -2px; font-size: 10px; animation-delay: 0.6s; }
.crown-star.side-r { top: 14px; right: -2px; font-size: 10px; animation-delay: 0.6s; }

@keyframes crownPulse {
  0% { opacity: 0.6; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.15); }
}

/* ── Small body ── */
.small-body {
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 52px;
  height: 56px;
  background: linear-gradient(180deg, #fcd34d, #d97706);
  border-radius: 50% 50% 45% 45%;
  filter: drop-shadow(0 4px 12px rgba(217,119,6,0.3));
  transition: all 0.3s ease;
  opacity: 0.85;
}

/* ── States ── */

/* Blink */
.state-blink .character-eye {
  transform: scaleY(0.1);
}

/* Sleep */
.state-sleep .character-eye {
  background: transparent;
  box-shadow: none;
  width: 24px;
  height: 0;
  padding-top: 8px;
  border-bottom: 2.5px solid #7c2d12;
  border-radius: 0 0 50% 50%;
  transform: none;
  transition: none;
}
.state-sleep .eyeball,
.state-sleep .pupil {
  display: none;
}
.state-sleep .mouth {
  width: 18px;
  border-bottom: none;
  border: none;
  height: 4px;
}
.state-sleep .small-body {
  opacity: 0.55;
}

/* Sleepy */
.state-sleepy .character-eye {
  transform: scaleY(0.45);
}

/* Wink */
.state-wink .character-eye:first-child {
  transform: scaleY(0.1);
}

/* Open */
.state-open .character-eye {
  width: 32px;
  height: 34px;
}
.state-open .mouth {
  width: 10px;
  height: 10px;
  border-bottom: none;
  border: 2.5px solid #7c2d12;
  border-radius: 50%;
}

/* Smile */
.state-smile .mouth {
  width: 20px;
  height: 12px;
  border-bottom-width: 3px;
}
.state-smile .blush-dot {
  background: rgba(251, 113, 133, 0.6);
  width: 18px;
  height: 12px;
}

/* ── Hint ── */
.hint {
  color: rgba(255,255,255,0.3);
  font-size: 0.85rem;
  margin-top: 3rem;
}
</style>
</head>
<body>

<div class="preview">
  <h1>✦ Starborn v2 · 圆润版</h1>

  <div class="scene">
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <div id="site-character" class="character">
      <!-- Crown stars -->
      <span class="crown-star top">✦</span>
      <span class="crown-star tl">✦</span>
      <span class="crown-star tr">✦</span>
      <span class="crown-star side-l">✦</span>
      <span class="crown-star side-r">✦</span>

      <!-- 3D oval body -->
      <div class="oval-body"></div>

      <!-- Face -->
      <div class="face-area">
        <div class="eyes">
          <div class="character-eye">
            <div class="eyeball">
              <div class="pupil"></div>
            </div>
          </div>
          <div class="character-eye">
            <div class="eyeball">
              <div class="pupil"></div>
            </div>
          </div>
        </div>
        <div class="mouth"></div>
        <div class="blush">
          <div class="blush-dot"></div>
          <div class="blush-dot"></div>
        </div>
      </div>

      <!-- Small body -->
      <div class="small-body"></div>
    </div>
  </div>

  <div class="hint">等待表情变化 · 眼睛跟随鼠标</div>
</div>

<script>
(function () {
  var el = document.getElementById('site-character');
  if (!el) return;

  var currentState = 'idle';
  var timer = null;
  var blinkTimer = null;
  var mouseX = 0;
  var mouseY = 0;
  var hasMouse = false;
  var rafId = null;

  var states = {
    idle:      { weight: 35, min: 2000, max: 4000 },
    smile:     { weight: 20, min: 2500, max: 4000 },
    sleepy:    { weight: 12, min: 3000, max: 4500 },
    sleep:     { weight: 6,  min: 4500, max: 6500 },
    wink:      { weight: 10, min: 250,  max: 350 },
    open:      { weight: 5,  min: 600,  max: 1000 },
  };

  var stateList = [];
  for (var key in states) {
    for (var i = 0; i < states[key].weight; i++) {
      stateList.push(key);
    }
  }

  var pupilTargets = { x: 0, y: 0 };
  var pupilCurrent = { x: 0, y: 0 };
  var eyesVisible = true;

  function isEyesVisible(state) {
    return state !== 'sleep' && state !== 'sleepy' && state !== 'smile';
  }

  function applyState(state) {
    el.className = el.className.replace(/\bstate-\S+/g, '').trim();
    if (state !== 'idle') {
      el.classList.add('state-' + state);
    }
    if (state === 'wink') {
      el.classList.add('state-wink');
    }
    currentState = state;
    eyesVisible = isEyesVisible(state);
    if (!eyesVisible) {
      pupilTargets.x = 0;
      pupilTargets.y = 0;
    }
  }

  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function pickState() {
    return stateList[Math.floor(Math.random() * stateList.length)];
  }

  function transitionTo(state) {
    clearTimeout(timer);
    clearTimeout(blinkTimer);
    applyState(state);
    var cfg = states[state];
    if (!cfg) return;
    var duration = randomInt(cfg.min, cfg.max);
    timer = setTimeout(function () {
      goIdle();
    }, duration);
  }

  function goIdle() {
    applyState('idle');
    scheduleBlink();
    timer = setTimeout(function () {
      var next = pickState();
      if (next === 'idle') {
        goIdle();
      } else {
        transitionTo(next);
      }
    }, randomInt(3000, 7000));
  }

  function blink() {
    if (currentState !== 'idle') return;
    el.classList.add('state-blink');
    setTimeout(function () {
      el.classList.remove('state-blink');
    }, 120);
    scheduleBlink();
  }

  function scheduleBlink() {
    clearTimeout(blinkTimer);
    blinkTimer = setTimeout(blink, randomInt(2500, 5000));
  }

  document.addEventListener('mousemove', function (e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
    hasMouse = true;
  });

  function trackPupils() {
    if (!hasMouse || !eyesVisible) {
      pupilCurrent.x += (pupilTargets.x - pupilCurrent.x) * 0.08;
      pupilCurrent.y += (pupilTargets.y - pupilCurrent.y) * 0.08;
    } else {
      var rect = el.getBoundingClientRect();
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2;
      var dx = mouseX - cx;
      var dy = mouseY - cy;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var maxDist = Math.max(rect.width, rect.height) * 1.5;
      var clamp = Math.min(dist / maxDist, 1);
      var maxPx = 3;
      var tx = (dx / dist) * clamp * maxPx;
      var ty = (dy / dist) * clamp * maxPx;
      if (dist < 5) { tx = 0; ty = 0; }
      pupilTargets.x = tx;
      pupilTargets.y = ty;
    }

    pupilCurrent.x += (pupilTargets.x - pupilCurrent.x) * 0.12;
    pupilCurrent.y += (pupilTargets.y - pupilCurrent.y) * 0.12;

    if (Math.abs(pupilCurrent.x) > 0.5 || Math.abs(pupilCurrent.y) > 0.5) {
      el.style.setProperty('--pupil-x', pupilCurrent.x + 'px');
      el.style.setProperty('--pupil-y', pupilCurrent.y + 'px');
    }

    rafId = requestAnimationFrame(trackPupils);
  }

  document.addEventListener('mouseleave', function () {
    hasMouse = false;
  });

  trackPupils();
  goIdle();
})();
</script>

</body>
</html>
